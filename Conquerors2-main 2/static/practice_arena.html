<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practice Arena — Code Lab</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: #2a2a3a;
      --accent: #00e5ff;
      --accent2: #7c3aed;
      --accent3: #10b981;
      --warn: #f59e0b;
      --danger: #ef4444;
      --text: #e2e8f0;
      --muted: #64748b;
      --easy: #10b981;
      --medium: #f59e0b;
      --hard: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Grid noise background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 229, 255, .03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 229, 255, .03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 10, 15, .92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 60px;
    }

    .logo {
      font-family: 'Space Mono', monospace;
      font-size: .95rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .logo span {
      color: var(--muted);
    }

    .header-nav {
      display: flex;
      gap: 1rem;
      margin-left: auto;
      align-items: center;
    }

    .xp-bar-wrap {
      display: flex;
      align-items: center;
      gap: .6rem;
      font-family: 'Space Mono', monospace;
      font-size: .72rem;
    }

    .xp-track {
      width: 120px;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }

    .xp-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 3px;
      transition: width .6s ease;
    }

    .level-badge {
      background: var(--surface2);
      border: 1px solid var(--accent2);
      color: var(--accent);
      padding: .15rem .5rem;
      border-radius: 4px;
      font-family: 'Space Mono', monospace;
      font-size: .72rem;
      font-weight: 700;
    }

    .back-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: .35rem .8rem;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: .8rem;
      transition: all .2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: .4rem;
    }

    .back-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Layout ── */
    .shell {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: calc(100vh - 60px);
      position: relative;
      z-index: 1;
    }

    /* ── Problem List Panel ── */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 1.2rem 1.2rem .8rem;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-title {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -.5px;
      margin-bottom: .8rem;
    }

    .filter-row {
      display: flex;
      gap: .4rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: .25rem .65rem;
      border-radius: 20px;
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: .7rem;
      transition: all .15s;
    }

    .filter-btn:hover {
      color: var(--text);
      border-color: var(--accent);
    }

    .filter-btn.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      font-weight: 700;
    }

    .filter-btn.easy.active {
      background: var(--easy);
      border-color: var(--easy);
    }

    .filter-btn.medium.active {
      background: var(--medium);
      border-color: var(--medium);
    }

    .filter-btn.hard.active {
      background: var(--hard);
      border-color: var(--hard);
    }

    .problem-list {
      overflow-y: auto;
      flex: 1;
      padding: .5rem;
    }

    .problem-list::-webkit-scrollbar {
      width: 4px;
    }

    .problem-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .problem-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .problem-card {
      padding: .85rem 1rem;
      border-radius: 8px;
      border: 1px solid transparent;
      cursor: pointer;
      margin-bottom: .35rem;
      transition: all .15s;
      position: relative;
      overflow: hidden;
    }

    .problem-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      border-radius: 2px 0 0 2px;
    }

    .problem-card.easy::before {
      background: var(--easy);
    }

    .problem-card.medium::before {
      background: var(--medium);
    }

    .problem-card.hard::before {
      background: var(--hard);
    }

    .problem-card:hover {
      background: var(--surface2);
      border-color: var(--border);
    }

    .problem-card.active {
      background: var(--surface2);
      border-color: var(--accent);
    }

    .problem-card.solved {
      opacity: .7;
    }

    .problem-card.solved .pc-title::after {
      content: ' ✓';
      color: var(--easy);
    }

    .pc-title {
      font-weight: 700;
      font-size: .9rem;
      margin-bottom: .3rem;
      padding-left: .6rem;
    }

    .pc-meta {
      display: flex;
      gap: .4rem;
      padding-left: .6rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .diff-badge {
      font-family: 'Space Mono', monospace;
      font-size: .65rem;
      font-weight: 700;
      padding: .1rem .4rem;
      border-radius: 3px;
    }

    .diff-badge.easy {
      background: rgba(16, 185, 129, .15);
      color: var(--easy);
    }

    .diff-badge.medium {
      background: rgba(245, 158, 11, .15);
      color: var(--medium);
    }

    .diff-badge.hard {
      background: rgba(239, 68, 68, .15);
      color: var(--hard);
    }

    .tag {
      font-size: .62rem;
      color: var(--muted);
      background: var(--border);
      padding: .1rem .35rem;
      border-radius: 3px;
    }

    /* ── Main Editor Area ── */
    .main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .problem-view {
      display: grid;
      grid-template-columns: 1fr 1fr;
      flex: 1;
      overflow: hidden;
    }

    /* Problem statement */
    .stmt-panel {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .stmt-scroll {
      overflow-y: auto;
      flex: 1;
      padding: 1.5rem;
    }

    .stmt-scroll::-webkit-scrollbar {
      width: 4px;
    }

    .stmt-scroll::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .prob-title-big {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -.5px;
      margin-bottom: .6rem;
    }

    .prob-diff-row {
      display: flex;
      gap: .6rem;
      align-items: center;
      margin-bottom: 1.2rem;
    }

    .prob-description {
      font-family: 'Space Mono', monospace;
      font-size: .8rem;
      line-height: 1.75;
      color: var(--text);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      white-space: pre-wrap;
    }

    .hint-section {
      margin-top: 1.2rem;
    }

    .hint-row {
      display: flex;
      gap: .5rem;
      margin-bottom: .8rem;
    }

    .hint-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: .35rem .8rem;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: .72rem;
      transition: all .15s;
    }

    .hint-btn:hover {
      border-color: var(--warn);
      color: var(--warn);
    }

    .hint-box {
      background: rgba(245, 158, 11, .07);
      border: 1px solid rgba(245, 158, 11, .3);
      border-radius: 8px;
      padding: .85rem 1rem;
      font-size: .82rem;
      line-height: 1.6;
      display: none;
    }

    .hint-box.visible {
      display: block;
    }

    .hint-concept {
      font-family: 'Space Mono', monospace;
      font-size: .7rem;
      color: var(--warn);
      margin-top: .4rem;
    }

    /* Editor panel */
    .editor-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .editor-toolbar {
      padding: .7rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: .6rem;
      flex-wrap: wrap;
    }

    .toolbar-label {
      font-family: 'Space Mono', monospace;
      font-size: .72rem;
      color: var(--muted);
      margin-right: auto;
    }

    .attempt-counter {
      font-family: 'Space Mono', monospace;
      font-size: .7rem;
      color: var(--muted);
      background: var(--surface2);
      padding: .2rem .6rem;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    .btn {
      padding: .4rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: .82rem;
      font-weight: 700;
      border: none;
      transition: all .15s;
      display: inline-flex;
      align-items: center;
      gap: .4rem;
    }

    .btn-reset {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-reset:hover {
      color: var(--text);
    }

    .btn-hint {
      background: rgba(245, 158, 11, .1);
      color: var(--warn);
      border: 1px solid rgba(245, 158, 11, .3);
    }

    .btn-hint:hover {
      background: rgba(245, 158, 11, .2);
    }

    .btn-run {
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: #fff;
      padding: .4rem 1.4rem;
    }

    .btn-run:hover {
      opacity: .85;
      transform: translateY(-1px);
    }

    .btn-run:disabled {
      opacity: .4;
      cursor: not-allowed;
      transform: none;
    }

    .editor-wrap {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    textarea#code-editor {
      width: 100%;
      height: 100%;
      background: #0d0d14;
      color: #cdd6f4;
      border: none;
      outline: none;
      resize: none;
      font-family: 'Space Mono', monospace;
      font-size: .82rem;
      line-height: 1.65;
      padding: 1rem;
      tab-size: 4;
    }

    textarea#code-editor::selection {
      background: rgba(0, 229, 255, .2);
    }

    /* ── Results Panel ── */
    .results-panel {
      border-top: 1px solid var(--border);
      height: 260px;
      min-height: 260px;
      display: flex;
      flex-direction: column;
      background: var(--surface);
    }

    .results-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      padding: 0 1rem;
    }

    .rtab {
      padding: .6rem .9rem;
      font-size: .78rem;
      font-weight: 700;
      cursor: pointer;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      transition: all .15s;
      margin-right: .2rem;
    }

    .rtab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .rtab:hover:not(.active) {
      color: var(--text);
    }

    .results-body {
      flex: 1;
      overflow-y: auto;
      padding: .9rem 1rem;
    }

    .results-body::-webkit-scrollbar {
      width: 4px;
    }

    .results-body::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* Test results */
    .test-grid {
      display: flex;
      flex-direction: column;
      gap: .5rem;
    }

    .test-row {
      display: flex;
      gap: .8rem;
      align-items: flex-start;
      background: var(--surface2);
      border-radius: 6px;
      padding: .6rem .85rem;
      border: 1px solid var(--border);
      font-family: 'Space Mono', monospace;
      font-size: .73rem;
    }

    .test-row.pass {
      border-color: rgba(16, 185, 129, .3);
    }

    .test-row.fail {
      border-color: rgba(239, 68, 68, .3);
    }

    .test-status {
      flex-shrink: 0;
      font-size: .9rem;
    }

    .test-info {
      flex: 1;
    }

    .test-vals {
      display: flex;
      gap: 1rem;
      margin-top: .25rem;
      color: var(--muted);
    }

    .test-val-expected {
      color: var(--easy);
    }

    .test-val-actual.wrong {
      color: var(--danger);
    }

    .test-note {
      color: var(--warn);
      margin-top: .25rem;
      font-size: .68rem;
    }

    /* AI feedback */
    .ai-panel {
      font-size: .83rem;
      line-height: 1.65;
    }

    .ai-summary {
      background: var(--surface2);
      border-left: 3px solid var(--accent);
      padding: .7rem 1rem;
      border-radius: 0 6px 6px 0;
      margin-bottom: .8rem;
      font-weight: 600;
    }

    .ai-section {
      margin-bottom: .7rem;
    }

    .ai-section-title {
      font-family: 'Space Mono', monospace;
      font-size: .68rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: .35rem;
    }

    .ai-list {
      list-style: none;
    }

    .ai-list li {
      padding: .2rem 0;
      display: flex;
      gap: .5rem;
    }

    .ai-list li::before {
      content: '›';
      color: var(--accent);
      flex-shrink: 0;
    }

    .complexity-row {
      display: flex;
      gap: .6rem;
      margin-bottom: .7rem;
      flex-wrap: wrap;
    }

    .complexity-tag {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: .2rem .6rem;
      font-family: 'Space Mono', monospace;
      font-size: .72rem;
    }

    .complexity-tag strong {
      color: var(--accent);
    }

    .encouragement {
      background: rgba(124, 58, 237, .1);
      border: 1px solid rgba(124, 58, 237, .3);
      border-radius: 6px;
      padding: .6rem .85rem;
      margin-top: .5rem;
      color: #c4b5fd;
      font-style: italic;
      font-size: .82rem;
    }

    .quality-badge {
      display: inline-block;
      padding: .15rem .55rem;
      border-radius: 4px;
      font-family: 'Space Mono', monospace;
      font-size: .68rem;
      font-weight: 700;
      margin-left: .4rem;
    }

    .quality-badge.Excellent {
      background: rgba(16, 185, 129, .2);
      color: var(--easy);
    }

    .quality-badge.Good {
      background: rgba(0, 229, 255, .1);
      color: var(--accent);
    }

    .quality-badge.Needs {
      background: rgba(245, 158, 11, .15);
      color: var(--warn);
    }

    .quality-badge.Poor {
      background: rgba(239, 68, 68, .15);
      color: var(--danger);
    }

    /* ── Verdict overlay ── */
    .verdict-flash {
      position: fixed;
      top: 80px;
      right: 2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.4rem;
      font-weight: 700;
      font-size: 1rem;
      z-index: 200;
      transform: translateX(120%);
      transition: transform .3s cubic-bezier(.34, 1.56, .64, 1);
      max-width: 300px;
    }

    .verdict-flash.show {
      transform: translateX(0);
    }

    .verdict-flash.pass {
      border-color: var(--easy);
      color: var(--easy);
    }

    .verdict-flash.partial {
      border-color: var(--warn);
      color: var(--warn);
    }

    .verdict-flash.fail {
      border-color: var(--danger);
      color: var(--danger);
    }

    .verdict-xp {
      font-family: 'Space Mono', monospace;
      font-size: .75rem;
      color: var(--accent);
      margin-top: .3rem;
    }

    /* ── Empty / Loading states ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 1rem;
      color: var(--muted);
      text-align: center;
      padding: 2rem;
    }

    .empty-icon {
      font-size: 3rem;
      opacity: .3;
    }

    .loading-dots {
      display: flex;
      gap: .4rem;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .loading-dots span {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: dot 1.2s infinite;
    }

    .loading-dots span:nth-child(2) {
      animation-delay: .2s;
    }

    .loading-dots span:nth-child(3) {
      animation-delay: .4s;
    }

    @keyframes dot {

      0%,
      100% {
        opacity: .3;
        transform: scale(.8)
      }

      50% {
        opacity: 1;
        transform: scale(1)
      }
    }

    /* ── XP popup ── */
    .xp-popup {
      position: fixed;
      pointer-events: none;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--accent);
      text-shadow: 0 0 20px var(--accent);
      z-index: 999;
      animation: xpFloat 1.5s ease forwards;
    }

    @keyframes xpFloat {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      100% {
        opacity: 0;
        transform: translateY(-60px) scale(1.3);
      }
    }

    /* ── Scrollbar global ── */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    /* ── Auth gate ── */
    .auth-note {
      font-family: 'Space Mono', monospace;
      font-size: .72rem;
      color: var(--muted);
      background: rgba(0, 229, 255, .05);
      border: 1px solid rgba(0, 229, 255, .15);
      border-radius: 6px;
      padding: .4rem .8rem;
    }

    /* Tab animations */
    .tab-content {
      animation: fadeSlide .2s ease;
    }

    @keyframes fadeSlide {
      from {
        opacity: 0;
        transform: translateY(4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">Code<span>/</span>Lab</div>
    <a href="/" class="back-btn">← Dashboard</a>
    <div class="header-nav">
      <div class="xp-bar-wrap" id="xp-display" style="display:none">
        <span class="level-badge" id="hdr-level">Lv 1</span>
        <div class="xp-track">
          <div class="xp-fill" id="hdr-xp-fill" style="width:0%"></div>
        </div>
        <span style="font-family:'Space Mono',monospace;font-size:.7rem;color:var(--muted)" id="hdr-xp-text">0 XP</span>
      </div>
      <span class="auth-note" id="auth-note">Login to save progress & earn XP</span>
    </div>
  </header>

  <div class="shell">
    <!-- ── Sidebar ── -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">Problems</div>
        <div class="filter-row">
          <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">All</button>
          <button class="filter-btn easy" data-filter="easy" onclick="setFilter('easy', this)">Easy</button>
          <button class="filter-btn medium" data-filter="medium" onclick="setFilter('medium', this)">Medium</button>
          <button class="filter-btn hard" data-filter="hard" onclick="setFilter('hard', this)">Hard</button>
        </div>
      </div>
      <div class="problem-list" id="problem-list">
        <div class="loading-dots" style="margin-top:2rem">
          <span></span><span></span><span></span>
        </div>
      </div>
    </aside>

    <!-- ── Main ── -->
    <div class="main">
      <div class="problem-view">
        <!-- Statement -->
        <div class="stmt-panel">
          <div class="stmt-scroll" id="stmt-scroll">
            <div class="empty-state">
              <div class="empty-icon">⌨️</div>
              <div style="font-weight:700;font-size:1.1rem">Select a Problem</div>
              <div style="font-size:.85rem">Choose from the list to begin coding</div>
            </div>
          </div>
        </div>

        <!-- Editor -->
        <div class="editor-panel">
          <div class="editor-toolbar">
            <span class="toolbar-label">python</span>
            <span class="attempt-counter" id="attempt-counter" style="display:none">Attempt #<span
                id="attempt-num">1</span></span>
            <button class="btn btn-reset" onclick="resetCode()" id="btn-reset" style="display:none">↺ Reset</button>
            <button class="btn btn-hint" onclick="getHint()" id="btn-hint" style="display:none">💡 Hint</button>
            <button class="btn btn-run" onclick="submitCode()" id="btn-run" disabled>▶ Run & Judge</button>
          </div>
          <div class="editor-wrap">
            <textarea id="code-editor" spellcheck="false" placeholder="Select a problem to start coding..."></textarea>
          </div>
        </div>
      </div>

      <!-- Results -->
      <div class="results-panel">
        <div class="results-tabs">
          <div class="rtab active" onclick="switchTab('tests', this)">Test Cases</div>
          <div class="rtab" onclick="switchTab('ai', this)">AI Feedback</div>
        </div>
        <div class="results-body">
          <div class="tab-content active" id="tab-tests">
            <div style="color:var(--muted);font-size:.82rem;padding:.5rem 0">Submit your code to see test results.</div>
          </div>
          <div class="tab-content" id="tab-ai">
            <div style="color:var(--muted);font-size:.82rem;padding:.5rem 0">AI analysis will appear here after you
              submit.</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Verdict flash -->
  <div class="verdict-flash" id="verdict-flash"></div>

  <script>
    // ── State ──────────────────────────────────────────────────────────────────
    const API = '/api';
    let allProblems = [];
    let currentProblem = null;
    let currentFilter = 'all';
    let attemptNumber = 1;
    let solvedSet = new Set(JSON.parse(localStorage.getItem('solved') || '[]'));
    let hintLevel = 1;
    let currentHint = null;

    const token = localStorage.getItem('authToken');

    // ── Init ───────────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', async () => {
      if (token) {
        document.getElementById('auth-note').style.display = 'none';
        document.getElementById('xp-display').style.display = 'flex';
        fetchXP();
      }
      await loadProblems();

      // Tab support
      document.getElementById('code-editor').addEventListener('keydown', e => {
        if (e.key === 'Tab') {
          e.preventDefault();
          const ta = e.target;
          const s = ta.selectionStart, end = ta.selectionEnd;
          ta.value = ta.value.substring(0, s) + '    ' + ta.value.substring(end);
          ta.selectionStart = ta.selectionEnd = s + 4;
        }
      });
    });

    async function fetchXP() {
      try {
        const r = await fetch(`${API}/user/xp`, { headers: { Authorization: `Bearer ${token}` } });
        if (!r.ok) return;
        const d = await r.json();
        updateXPBar(d.progress, d.exp, d.level);
      } catch { }
    }

    function updateXPBar(progress, exp, level) {
      document.getElementById('hdr-level').textContent = `Lv ${level}`;
      document.getElementById('hdr-xp-fill').style.width = `${progress}%`;
      document.getElementById('hdr-xp-text').textContent = `${exp} XP`;
    }

    // ── Problems ───────────────────────────────────────────────────────────────
    async function loadProblems() {
      try {
        const r = await fetch(`${API}/practice/problems`);
        allProblems = await r.json();
        renderList();
      } catch (e) {
        document.getElementById('problem-list').innerHTML =
          `<div style="color:var(--danger);padding:1rem;font-size:.8rem">Failed to load problems. Is the server running?</div>`;
      }
    }

    function setFilter(f, btn) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderList();
    }

    function renderList() {
      const filtered = currentFilter === 'all'
        ? allProblems
        : allProblems.filter(p => p.difficulty.toLowerCase() === currentFilter);

      const list = document.getElementById('problem-list');
      if (!filtered.length) {
        list.innerHTML = `<div class="empty-state"><div>No problems found</div></div>`;
        return;
      }
      list.innerHTML = filtered.map(p => {
        const diff = p.difficulty.toLowerCase();
        const solved = solvedSet.has(p.id) ? ' solved' : '';
        const active = currentProblem?.id === p.id ? ' active' : '';
        return `
      <div class="problem-card ${diff}${solved}${active}" onclick="selectProblem('${p.id}')">
        <div class="pc-title">${p.title}</div>
        <div class="pc-meta">
          <span class="diff-badge ${diff}">${p.difficulty}</span>
          ${p.tags.slice(0, 2).map(t => `<span class="tag">${t}</span>`).join('')}
        </div>
      </div>`;
      }).join('');
    }

    async function selectProblem(id) {
      const p = allProblems.find(x => x.id === id);
      if (!p) return;
      currentProblem = p;
      attemptNumber = 1;
      hintLevel = 1;
      currentHint = null;

      document.getElementById('attempt-counter').style.display = 'flex';
      document.getElementById('attempt-num').textContent = '1';
      document.getElementById('btn-reset').style.display = 'inline-flex';
      document.getElementById('btn-hint').style.display = 'inline-flex';
      document.getElementById('btn-run').disabled = false;

      // Render statement
      const diff = p.difficulty.toLowerCase();
      document.getElementById('stmt-scroll').innerHTML = `
    <div class="prob-title-big">${p.title}</div>
    <div class="prob-diff-row">
      <span class="diff-badge ${diff}">${p.difficulty}</span>
      ${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}
    </div>
    <pre class="prob-description">${escHtml(p.description)}</pre>
    <div class="hint-section">
      <div class="hint-row">
        <button class="hint-btn" onclick="getHint(1)">Hint 1 (Vague)</button>
        <button class="hint-btn" onclick="getHint(2)">Hint 2 (Medium)</button>
        <button class="hint-btn" onclick="getHint(3)">Hint 3 (Specific)</button>
      </div>
      <div class="hint-box" id="hint-box">
        <div id="hint-text"></div>
        <div class="hint-concept" id="hint-concept"></div>
      </div>
    </div>
  `;

      // Load starter
      document.getElementById('code-editor').value = p.starter || '';

      // Reset results
      clearResults();
      renderList();
    }

    function resetCode() {
      if (!currentProblem) return;
      if (confirm('Reset to starter code?')) {
        document.getElementById('code-editor').value = currentProblem.starter || '';
        clearResults();
      }
    }

    function clearResults() {
      document.getElementById('tab-tests').innerHTML = `<div style="color:var(--muted);font-size:.82rem;padding:.5rem 0">Submit your code to see test results.</div>`;
      document.getElementById('tab-ai').innerHTML = `<div style="color:var(--muted);font-size:.82rem;padding:.5rem 0">AI analysis will appear here after you submit.</div>`;
    }

    // ── Hints ──────────────────────────────────────────────────────────────────
    async function getHint(level) {
      if (!currentProblem) return;
      const hl = level || hintLevel;
      const btn = document.getElementById('btn-hint');
      if (btn) btn.disabled = true;

      const hintBox = document.getElementById('hint-box');
      if (hintBox) {
        hintBox.classList.add('visible');
        document.getElementById('hint-text').textContent = 'Loading hint...';
        document.getElementById('hint-concept').textContent = '';
      }

      try {
        const r = await fetch(`${API}/practice/hint`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            problem_id: currentProblem.id,
            code: document.getElementById('code-editor').value,
            hint_level: hl,
          }),
        });
        const d = await r.json();
        if (hintBox) {
          document.getElementById('hint-text').textContent = d.hint || 'Think carefully about the problem.';
          document.getElementById('hint-concept').textContent = d.concept ? `📚 Key concept: ${d.concept}` : '';
          hintBox.classList.add('visible');
        }
        if (hintLevel < 3) hintLevel++;
      } catch {
        if (document.getElementById('hint-text'))
          document.getElementById('hint-text').textContent = 'Could not load hint.';
      } finally {
        if (btn) btn.disabled = false;
      }
    }

    // ── Submit ─────────────────────────────────────────────────────────────────
    async function submitCode() {
      if (!currentProblem) return;
      const btn = document.getElementById('btn-run');
      btn.disabled = true;
      btn.textContent = '⏳ Judging...';

      // Show loading in results
      document.getElementById('tab-tests').innerHTML = `<div class="loading-dots"><span></span><span></span><span></span></div>`;
      document.getElementById('tab-ai').innerHTML = `<div class="loading-dots"><span></span><span></span><span></span></div>`;

      const code = document.getElementById('code-editor').value;

      try {
        const headers = { 'Content-Type': 'application/json' };
        if (token) headers['Authorization'] = `Bearer ${token}`;

        const r = await fetch(`${API}/practice/submit`, {
          method: 'POST',
          headers,
          body: JSON.stringify({
            problem_id: currentProblem.id,
            code,
            attempt_number: attemptNumber,
          }),
        });
        const d = await r.json();

        renderTestResults(d.test_results || []);
        renderAIFeedback(d.ai);

        // Track attempt
        attemptNumber++;
        document.getElementById('attempt-num').textContent = attemptNumber;

        // Flash verdict
        const verdict = d.all_passed ? 'pass' : (d.any_passed ? 'partial' : 'fail');
        const msg = d.all_passed
          ? '✅ All Tests Passed!'
          : d.any_passed
            ? `⚡ ${d.test_results.filter(t => t.passed).length}/${d.test_results.length} Tests Passed`
            : '❌ Tests Failed';
        showVerdictFlash(verdict, msg, d.exp_result);

        // Mark solved
        if (d.all_passed) {
          solvedSet.add(currentProblem.id);
          localStorage.setItem('solved', JSON.stringify([...solvedSet]));
          renderList();
        }

        // Update XP
        if (d.exp_result) {
          updateXPBar(d.exp_result.progress, d.exp_result.total_exp, d.exp_result.new_level);
          if (d.exp_result.exp_gained > 0) showXPPopup(`+${d.exp_result.exp_gained} XP`);
        }

        // Switch to test tab
        switchTab('tests', document.querySelector('.rtab'));
      } catch (e) {
        document.getElementById('tab-tests').innerHTML = `<div style="color:var(--danger)">Error: ${e.message}</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = '▶ Run & Judge';
      }
    }

    function renderTestResults(results) {
      if (!results.length) {
        document.getElementById('tab-tests').innerHTML = `<div style="color:var(--muted)">No test results.</div>`;
        return;
      }
      const html = `<div class="test-grid">${results.map((r, i) => `
    <div class="test-row ${r.passed ? 'pass' : 'fail'}">
      <div class="test-status">${r.passed ? '✅' : '❌'}</div>
      <div class="test-info">
        <div style="font-weight:700">Test ${i + 1}</div>
        <div class="test-vals">
          <span>Expected: <span class="test-val-expected">${escHtml(r.expected)}</span></span>
          <span>Got: <span class="test-val-actual ${r.passed ? '' : 'wrong'}">${escHtml(r.actual || '(no output)')}</span></span>
        </div>
        ${r.note ? `<div class="test-note">${escHtml(r.note)}</div>` : ''}
      </div>
    </div>`).join('')}
  </div>`;
      document.getElementById('tab-tests').innerHTML = html;
    }

    function renderAIFeedback(ai) {
      if (!ai) {
        document.getElementById('tab-ai').innerHTML = `<div style="color:var(--muted);font-size:.82rem">AI feedback unavailable (no API key or error).</div>`;
        return;
      }

      const quality = ai.code_quality || '';
      const qualityClass = quality.includes('Needs') ? 'Needs' : quality;

      let html = `<div class="ai-panel">`;

      if (ai.summary) html += `<div class="ai-summary">${escHtml(ai.summary)}
    ${quality ? `<span class="quality-badge ${qualityClass}">${quality}</span>` : ''}
  </div>`;

      if (ai.time_complexity || ai.space_complexity) {
        html += `<div class="complexity-row">
      ${ai.time_complexity ? `<span class="complexity-tag"><strong>Time</strong> ${escHtml(ai.time_complexity)}</span>` : ''}
      ${ai.space_complexity ? `<span class="complexity-tag"><strong>Space</strong> ${escHtml(ai.space_complexity)}</span>` : ''}
    </div>`;
      }

      if (ai.strengths?.length) {
        html += `<div class="ai-section">
      <div class="ai-section-title">✅ Strengths</div>
      <ul class="ai-list">${ai.strengths.map(s => `<li>${escHtml(s)}</li>`).join('')}</ul>
    </div>`;
      }

      if (ai.issues?.length) {
        html += `<div class="ai-section">
      <div class="ai-section-title">⚠️ Issues</div>
      <ul class="ai-list">${ai.issues.map(s => `<li>${escHtml(s)}</li>`).join('')}</ul>
    </div>`;
      }

      if (ai.hints?.length) {
        html += `<div class="ai-section">
      <div class="ai-section-title">💡 Hints</div>
      <ul class="ai-list">${ai.hints.map(s => `<li>${escHtml(s)}</li>`).join('')}</ul>
    </div>`;
      }

      if (ai.better_approach) {
        html += `<div class="ai-section">
      <div class="ai-section-title">🚀 Better Approach</div>
      <div style="font-size:.8rem;color:var(--muted)">${escHtml(ai.better_approach)}</div>
    </div>`;
      }

      if (ai.encouragement) {
        html += `<div class="encouragement">🎯 ${escHtml(ai.encouragement)}</div>`;
      }

      html += `</div>`;
      document.getElementById('tab-ai').innerHTML = html;
    }

    // ── UI Helpers ─────────────────────────────────────────────────────────────
    function switchTab(name, clickedEl) {
      document.querySelectorAll('.rtab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      if (clickedEl) clickedEl.classList.add('active');
      else document.querySelectorAll('.rtab')[name === 'tests' ? 0 : 1]?.classList.add('active');
      document.getElementById(`tab-${name}`)?.classList.add('active');
    }

    let verdictTimer = null;
    function showVerdictFlash(type, msg, expResult) {
      const el = document.getElementById('verdict-flash');
      el.className = `verdict-flash ${type} show`;
      el.innerHTML = msg + (expResult ? `<div class="verdict-xp">+${expResult.exp_gained} XP</div>` : '');
      if (verdictTimer) clearTimeout(verdictTimer);
      verdictTimer = setTimeout(() => el.classList.remove('show'), 3500);
    }

    function showXPPopup(text) {
      const el = document.createElement('div');
      el.className = 'xp-popup';
      el.textContent = text;
      el.style.cssText = `left:${window.innerWidth - 150}px;top:${window.innerHeight - 100}px`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1600);
    }

    function escHtml(s) {
      if (s == null) return '';
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
  </script>
</body>

</html>
